<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-Fi MIDI Machine</title>
    <style>
        :root {
            --bg: #1a1a1c;
            --machine: #242428;
            --machine-border: #35353a;
            --text: #e0e0e0;
            --accent-red: #e74c3c;
            --accent-red-glow: #ff4757;
            --screen-bg: #050505;
            --screen-text: #00ff41;
            --pad-black: #1a1a1a;
            --pad-lit: #e74c3c;
            --knob-bg: #333;
            --knob-ind: #fff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
        }

        .machine {
            background: var(--machine);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.05);
            width: 100%;
            max-width: 650px;
            border: 2px solid var(--machine-border);
            border-bottom: 8px solid #111; /* Chunky base */
        }

        /* Top Screen / Share Bar */
        .header-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            background: var(--screen-bg);
            border: 2px solid #222;
            color: var(--screen-text);
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 6px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0,255,65,0.1);
            text-shadow: 0 0 5px rgba(0,255,65,0.5);
        }

        .btn {
            background: var(--knob-bg);
            color: #fff;
            border: 2px solid #222;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #111;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 0 #111; }

        /* Big Knobs & Displays */
        .macro-section {
            display: flex;
            gap: 20px;
            background: #1e1e22;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .macro-module {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .macro-label { font-size: 0.75rem; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}

        .digital-display {
            background: var(--screen-bg);
            color: var(--accent-red-glow);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px;
            width: 100%;
            text-align: center;
            border-radius: 4px;
            border: 2px solid #111;
            box-shadow: inset 0 0 10px rgba(255, 71, 87, 0.2);
            text-shadow: 0 0 5px rgba(255, 71, 87, 0.8);
            box-sizing: border-box;
            height: 38px;
        }

        /* Rotary Knob Component */
        .knob-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .knob {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(145deg, #3a3a40, #25252a);
            box-shadow: 0 8px 10px rgba(0,0,0,0.6), inset 0 2px 2px rgba(255,255,255,0.1);
            position: relative;
            cursor: ns-resize; /* Up/down drag cursor */
            border: 2px solid #111;
        }

        .knob-indicator {
            width: 4px;
            height: 50%;
            background: var(--knob-ind);
            position: absolute;
            left: 50%;
            top: 0;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-135deg); /* Min value */
            border-radius: 2px;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
            pointer-events: none;
        }

        .knob-small { width: 45px; height: 45px; }

        /* Chord Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tab {
            flex: 1;
            background: #2a2a30;
            color: #888;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            border: 1px solid #333;
            border-bottom: none;
        }

        .tab.active {
            background: #1e1e22;
            color: var(--accent-red);
            border-top: 2px solid var(--accent-red);
        }

        /* Hardware Pads */
        .pad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            background: #1e1e22;
            padding: 15px;
            border-radius: 0 0 8px 8px;
            border: 1px solid #333;
            border-top: none;
        }

        .pad {
            aspect-ratio: 1.3;
            background: var(--pad-black);
            border: 2px solid #111;
            border-radius: 4px;
            color: #666;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.05), 0 5px 0 #0a0a0a;
            transition: 0.05s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .pad span { font-size: 0.65rem; color: #444; margin-top: 4px; }

        .pad:active, .pad.active {
            box-shadow: inset 0 2px 15px rgba(231, 76, 60, 0.4), 0 1px 0 #0a0a0a;
            transform: translateY(4px);
            color: #fff;
            border-color: var(--accent-red);
        }
        
        .pad:active span, .pad.active span { color: #aaa; }

        /* Bottom Mix / Play Section */
        .bottom-section {
            display: flex;
            margin-top: 20px;
            gap: 20px;
            align-items: center;
        }

        .mix-knobs {
            display: flex;
            gap: 20px;
            flex: 1;
        }

        .play-btn {
            background: var(--accent-red);
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 6px 0 #a93226;
        }
        .play-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #a93226; }
        .play-btn.playing { background: #2ecc71; box-shadow: 0 6px 0 #229954; }

    </style>
</head>
<body>

<div class="machine">
    <!-- Screen & Share -->
    <div class="header-bar">
        <input type="text" id="seedInput" value="DREAM-M1-D1" onchange="parseSeedFromInput()">
        <button class="btn" onclick="randomizeSeed()">🎲</button>
    </div>

    <!-- Big Digital Macro Knobs -->
    <div class="macro-section">
        <div class="macro-module">
            <span class="macro-label">Melody Engine</span>
            <div class="digital-display" id="melDisplay">1: SPARSE</div>
            <div class="knob-container">
                <div class="knob" id="knob-melody" data-min="1" data-max="4" data-val="1">
                    <div class="knob-indicator"></div>
                </div>
            </div>
        </div>
        <div class="macro-module">
            <span class="macro-label">Drum Groove</span>
            <div class="digital-display" id="drumDisplay">1: BOOM BAP</div>
            <div class="knob-container">
                <div class="knob" id="knob-drum" data-min="1" data-max="4" data-val="1">
                    <div class="knob-indicator"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chord Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="setTab(0)">MINOR</div>
        <div class="tab" onclick="setTab(1)">MAJOR</div>
        <div class="tab" onclick="setTab(2)">NEO-SOUL</div>
        <div class="tab" onclick="setTab(3)">DARK/DIM</div>
    </div>

    <!-- Pads -->
    <div class="pad-grid" id="padContainer">
        <!-- Injected via JS -->
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-section">
        <div class="mix-knobs">
            <div class="knob-container">
                <span class="macro-label">Dust</span>
                <div class="knob knob-small" id="knob-dust" data-min="0" data-max="100" data-val="60">
                    <div class="knob-indicator"></div>
                </div>
            </div>
            <div class="knob-container">
                <span class="macro-label">Wobble</span>
                <div class="knob knob-small" id="knob-wobble" data-min="0" data-max="100" data-val="40">
                    <div class="knob-indicator"></div>
                </div>
            </div>
        </div>
        <button class="play-btn" id="playBtn" onclick="togglePlay()">► PLAY</button>
    </div>
</div>

<script>
    // --- State & Settings ---
    let audioCtx;
    let isPlaying = false;
    let timerID;
    let rng = Math.random;
    
    const bpm = 80;
    const totalSteps = 256; // 16 bars
    let currentStep = 0, nextNoteTime = 0;

    // Macro States
    let currentMelodyType = 1;
    let currentDrumType = 1;
    let currentBaseSeed = "DREAM";
    let activeChordOverride = null; // Holds notes array if pad is held/active
    let activeTab = 0;

    // Sequences
    let seqKick = new Array(totalSteps).fill(0);
    let seqSnare = new Array(totalSteps).fill(0);
    let seqHat = new Array(totalSteps).fill(0);
    let seqChords = new Array(totalSteps).fill(null);
    let seqMelody = new Array(totalSteps).fill(null);

    // DSP Nodes
    let masterGain, tapeDelay, lowpass, crackleGain, lfoGain;
    let noiseBuffer;

    // --- Music Theory Data ---
    const C3 = 48;
    const chordBanks = [
        // Tab 0: Minor (Melancholy)
        [
            { n: "Cm9", v: [C3, C3+3, C3+7, C3+10, C3+14] },
            { n: "Fm9", v: [C3+5, C3+8, C3+12, C3+15, C3+19] },
            { n: "Gm7", v: [C3+7, C3+10, C3+14, C3+17] },
            { n: "EbMaj9", v: [C3+3, C3+7, C3+10, C3+14, C3+17] },
            { n: "AbMaj9", v: [C3+8, C3+12, C3+15, C3+19, C3+22] },
            { n: "BbDom9", v: [C3+10, C3+14, C3+17, C3+20, C3+24] }
        ],
        // Tab 1: Major (Uplifting/Chill)
        [
            { n: "Cmaj9", v: [C3, C3+4, C3+7, C3+11, C3+14] },
            { n: "Dm9", v: [C3+2, C3+5, C3+9, C3+12, C3+16] },
            { n: "Em7", v: [C3+4, C3+7, C3+11, C3+14] },
            { n: "Fmaj9", v: [C3+5, C3+9, C3+12, C3+16, C3+19] },
            { n: "G13", v: [C3+7, C3+11, C3+14, C3+17, C3+21] },
            { n: "Am9", v: [C3+9, C3+12, C3+16, C3+19, C3+23] }
        ],
        // Tab 2: Neo-Soul (Jazzy/Spicy)
        [
            { n: "Cm11", v: [C3, C3+3, C3+7, C3+10, C3+14, C3+17] },
            { n: "DbMaj9", v: [C3+1, C3+5, C3+8, C3+12, C3+15] },
            { n: "Ebmin9", v: [C3+3, C3+6, C3+10, C3+13, C3+17] },
            { n: "Ab13", v: [C3-4, C3+2, C3+6, C3+9, C3+13] },
            { n: "G7#5#9", v: [C3-5, C3+3, C3+6, C3+11, C3+14] },
            { n: "Cm9", v: [C3, C3+3, C3+7, C3+10, C3+14] }
        ],
        // Tab 3: Dark/Dim (Tension)
        [
            { n: "Cm(M7)", v: [C3, C3+3, C3+7, C3+11] },
            { n: "Fdim7", v: [C3+5, C3+8, C3+11, C3+14] },
            { n: "G7b9", v: [C3+7, C3+11, C3+14, C3+17, C3+20] },
            { n: "Abm6", v: [C3+8, C3+11, C3+15, C3+17] },
            { n: "Bdim7", v: [C3+11, C3+14, C3+17, C3+20] },
            { n: "Cm9", v: [C3, C3+3, C3+7, C3+10, C3+14] }
        ]
    ];

    const melNames = ["1: SPARSE", "2: ARPS", "3: LIKCS", "4: DREAMY"];
    const drumNames = ["1: BOOM BAP", "2: MINIMAL", "3: BUSY", "4: HEAVY"];

    // PRNG
    function cyrb128(str) {
        let h1=1779033703, h2=3144134277, h3=1013904242, h4=2773480762;
        for(let i=0;i<str.length;i++){
            let k=str.charCodeAt(i);
            h1=h2^Math.imul(h1^k,597399067); h2=h3^Math.imul(h2^k,2869860233);
            h3=h4^Math.imul(h3^k,951274213); h4=h1^Math.imul(h4^k,2716044179);
        }
        return (Math.imul(h3^(h1>>>18),597399067)^Math.imul(h4^(h2>>>22),2869860233))>>>0;
    }
    function mulberry32(a) {
        return function(){
            var t=a+=0x6D2B79F5;
            t=Math.imul(t^t>>>15,t|1); t^=t+Math.imul(t^t>>>7,t|61);
            return ((t^t>>>14)>>>0)/4294967296;
        }
    }
    function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

    // --- UI Logic (Knobs, Tabs, Pads) ---
    function initKnobs() {
        document.querySelectorAll('.knob').forEach(el => {
            let min = parseFloat(el.getAttribute('data-min'));
            let max = parseFloat(el.getAttribute('data-max'));
            let val = parseFloat(el.getAttribute('data-val'));
            let ind = el.querySelector('.knob-indicator');
            
            function updateAngle(v) {
                let pct = (v - min) / (max - min);
                let deg = -135 + (pct * 270);
                ind.style.transform = `translateX(-50%) rotate(${deg}deg)`;
            }
            updateAngle(val);

            let isDragging = false;
            let startY, startVal;

            function onStart(e) {
                isDragging = true;
                startY = e.touches ? e.touches[0].clientY : e.clientY;
                startVal = parseFloat(el.getAttribute('data-val'));
            }
            function onMove(e) {
                if(!isDragging) return;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                let delta = startY - clientY; 
                let range = max - min;
                let newVal = Math.max(min, Math.min(max, startVal + (delta / 100) * range));
                
                // If it's a macro knob (1-4), round to integer
                if(max <= 4) newVal = Math.round(newVal);
                
                el.setAttribute('data-val', newVal);
                updateAngle(newVal);
                handleKnobChange(el.id, newVal);
            }
            function onEnd() { isDragging = false; }

            el.addEventListener('mousedown', onStart);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
            
            el.addEventListener('touchstart', onStart, {passive:true});
            window.addEventListener('touchmove', onMove, {passive:true});
            window.addEventListener('touchend', onEnd);
        });
    }

    function handleKnobChange(id, val) {
        if (id === 'knob-melody') {
            currentMelodyType = val;
            document.getElementById('melDisplay').innerText = melNames[val-1];
            updateSeedString();
        } else if (id === 'knob-drum') {
            currentDrumType = val;
            document.getElementById('drumDisplay').innerText = drumNames[val-1];
            updateSeedString();
        } else if (id === 'knob-dust' && crackleGain) {
            crackleGain.gain.value = (val / 100) * 0.05;
            lowpass.frequency.value = 6000 - ((val / 100) * 4500);
        } else if (id === 'knob-wobble' && lfoGain) {
            lfoGain.gain.value = (val / 100) * 0.003;
        }
    }

    function setKnobValue(id, val) {
        let el = document.getElementById(id);
        el.setAttribute('data-val', val);
        let min = parseFloat(el.getAttribute('data-min'));
        let max = parseFloat(el.getAttribute('data-max'));
        let ind = el.querySelector('.knob-indicator');
        let pct = (val - min) / (max - min);
        ind.style.transform = `translateX(-50%) rotate(${-135 + (pct * 270)}deg)`;
        handleKnobChange(id, val);
    }

    // Tabs & Pads
    function setTab(idx) {
        activeTab = idx;
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', i === idx);
        });
        renderPads();
    }

    function renderPads() {
        let container = document.getElementById('padContainer');
        container.innerHTML = '';
        chordBanks[activeTab].forEach((chord, i) => {
            let btn = document.createElement('button');
            btn.className = 'pad';
            btn.innerHTML = `${chord.n} <span>Pad 0${i+1}</span>`;
            
            // Interaction
            btn.onmousedown = () => playPad(btn, chord.v);
            btn.ontouchstart = (e) => { e.preventDefault(); playPad(btn, chord.v); }
            btn.onmouseup = () => activeChordOverride = null;
            btn.ontouchend = () => activeChordOverride = null;
            btn.onmouseleave = () => activeChordOverride = null;
            
            container.appendChild(btn);
        });
    }

    function playPad(btn, notes) {
        if(!audioCtx) initAudio();
        // Visual feedback
        document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        
        activeChordOverride = notes; // Override generator
        playSynthChord(audioCtx.currentTime, notes, true); // Play instantly
    }

    // --- Seed Management ---
    function updateSeedString() {
        let s = `${currentBaseSeed}-M${currentMelodyType}-D${currentDrumType}`;
        document.getElementById('seedInput').value = s;
        if(isPlaying) generateProcedural(); // Re-calc arrays on the fly
    }

    function parseSeedFromInput() {
        let str = document.getElementById('seedInput').value.trim().toUpperCase();
        let match = str.match(/^([A-Z0-9]+)(?:-M([1-4]))?(?:-D([1-4]))?$/);
        if(match) {
            currentBaseSeed = match[1];
            if(match[2]) setKnobValue('knob-melody', parseInt(match[2]));
            if(match[3]) setKnobValue('knob-drum', parseInt(match[3]));
            generateProcedural();
        } else {
            // Revert on invalid
            updateSeedString();
        }
    }

    function randomizeSeed() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let str = '';
        for(let i=0; i<5; i++) str += chars.charAt(Math.floor(Math.random() * chars.length));
        currentBaseSeed = str;
        setKnobValue('knob-melody', Math.floor(Math.random()*4)+1);
        setKnobValue('knob-drum', Math.floor(Math.random()*4)+1);
    }

    // --- Generator Logic ---
    function generateProcedural() {
        // Tie PRNG to full seed string so identical strings = identical beats
        let fullSeed = `${currentBaseSeed}-M${currentMelodyType}-D${currentDrumType}`;
        rng = mulberry32(cyrb128(fullSeed));

        seqKick.fill(0); seqSnare.fill(0); seqHat.fill(0);
        seqChords.fill(null); seqMelody.fill(null);

        // Drums Generation
        for(let i=0; i<totalSteps; i++) {
            let m1 = i % 16; // step in bar
            
            if(currentDrumType === 1) { // Boom Bap
                if([0, 10].includes(m1)) seqKick[i] = 1;
                if([4, 12].includes(m1)) seqSnare[i] = 1;
                if(m1 % 2 === 0) seqHat[i] = 0.5 + rng()*0.3;
            } 
            else if(currentDrumType === 2) { // Minimal
                if(m1 === 0) seqKick[i] = 1;
                if(m1 === 8) seqSnare[i] = 0.8;
                if(m1 % 4 === 2 && rng()>0.5) seqHat[i] = 0.4;
            }
            else if(currentDrumType === 3) { // Busy
                if([0, 7, 10].includes(m1)) seqKick[i] = 1;
                if([4, 12].includes(m1)) seqSnare[i] = 1;
                seqHat[i] = 0.4 + rng()*0.4; // 16ths
            }
            else if(currentDrumType === 4) { // Heavy
                if([0, 8, 9].includes(m1)) seqKick[i] = 1.2;
                if([4, 12].includes(m1)) seqSnare[i] = 1.2;
                if(m1 % 4 === 0) seqHat[i] = 0.7;
            }
            
            // Random Ghosts
            if(!seqKick[i] && !seqSnare[i] && rng()>0.92) seqKick[i] = 0.3;
        }

        // Chords & Melody Generation
        // Pick a chord progression from active Tab
        let prog = [
            chordBanks[activeTab][Math.floor(rng()*6)].v,
            chordBanks[activeTab][Math.floor(rng()*6)].v,
            chordBanks[activeTab][Math.floor(rng()*6)].v,
            chordBanks[activeTab][Math.floor(rng()*6)].v
        ];

        for(let bar=0; bar<16; bar++) {
            let chord = prog[bar % 4];
            
            // Drop chord on beat 1
            if(rng() > 0.1) seqChords[bar * 16] = chord;

            // Generate Melody based on Type
            for(let s=0; s<16; s++) {
                let step = bar * 16 + s;
                let cNotes = chord.map(n => n % 12); // Get pitch classes
                let root = chord[0] + 12; // Octave up
                
                if(currentMelodyType === 1) { // Sparse
                    if(rng() > 0.9) seqMelody[step] = chord[Math.floor(rng()*chord.length)] + 12;
                }
                else if(currentMelodyType === 2) { // Arps
                    if(s % 2 === 0 && rng()>0.2) seqMelody[step] = chord[(s/2) % chord.length] + 12;
                }
                else if(currentMelodyType === 3) { // Licks (syncopated)
                    if([3,6,9,14].includes(s) && rng()>0.3) seqMelody[step] = chord[Math.floor(rng()*chord.length)] + 12;
                }
                else if(currentMelodyType === 4) { // Dreamy (mostly long whole notes)
                    if(s === 0) seqMelody[step] = chord[chord.length-1] + 12; // Play top note
                }
            }
        }
    }

    // --- Audio System ---
    function initAudio() {
        if(audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        masterGain = audioCtx.createGain(); masterGain.gain.value = 0.7;
        
        // Lo-Fi FX Chain
        tapeDelay = audioCtx.createDelay(); tapeDelay.delayTime.value = 0.005;
        let lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.2;
        lfoGain = audioCtx.createGain(); 
        lfo.connect(lfoGain); lfoGain.connect(tapeDelay.delayTime); lfo.start();

        lowpass = audioCtx.createBiquadFilter(); lowpass.type = 'lowpass';

        masterGain.connect(tapeDelay); tapeDelay.connect(lowpass); lowpass.connect(audioCtx.destination);

        // Noise
        noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
        let out = noiseBuffer.getChannelData(0);
        for(let i=0; i<audioCtx.sampleRate; i++) out[i] = Math.random()*2-1;
        
        let noiseSrc = audioCtx.createBufferSource(); noiseSrc.buffer = noiseBuffer; noiseSrc.loop = true;
        let nFilter = audioCtx.createBiquadFilter(); nFilter.type = 'bandpass'; nFilter.frequency.value = 2500;
        crackleGain = audioCtx.createGain();
        noiseSrc.connect(nFilter); nFilter.connect(crackleGain); crackleGain.connect(masterGain);
        noiseSrc.start();

        // Trigger knob updates to set initial audio params
        handleKnobChange('knob-dust', 60);
        handleKnobChange('knob-wobble', 40);
    }

    // Synths
    function playKick(t, v) {
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.frequency.setValueAtTime(currentDrumType===4 ? 100 : 150, t);
        o.frequency.exponentialRampToValueAtTime(0.01, t+0.5);
        g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.5);
        o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.5);
    }
    function playSnare(t, v) {
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.frequency.setValueAtTime(200, t); g.gain.setValueAtTime(v*0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.2);
        o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.2);
        
        let n = audioCtx.createBufferSource(); n.buffer = noiseBuffer;
        let ng = audioCtx.createGain(); ng.gain.setValueAtTime(v*0.7, t); ng.gain.exponentialRampToValueAtTime(0.001, t+0.3);
        n.connect(ng); ng.connect(masterGain); n.start(t); n.stop(t+0.3);
    }
    function playHat(t, v) {
        let n = audioCtx.createBufferSource(); n.buffer = noiseBuffer;
        let f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6000;
        let g = audioCtx.createGain(); g.gain.setValueAtTime(v*0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.1);
        n.connect(f); f.connect(g); g.connect(masterGain); n.start(t); n.stop(t+0.1);
    }

    function playSynthChord(t, notes, isPluck) {
        notes.forEach(note => {
            let o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'triangle'; o.frequency.value = midiToFreq(note);
            g.gain.setValueAtTime(0, t);
            if(isPluck) { g.gain.linearRampToValueAtTime(0.15, t+0.05); g.gain.exponentialRampToValueAtTime(0.001, t+1.5); }
            else { g.gain.linearRampToValueAtTime(0.1, t+0.1); g.gain.exponentialRampToValueAtTime(0.001, t+3); }
            o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+3);
        });
    }

    function playSynthMelody(t, note) {
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = midiToFreq(note);
        g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.15, t+0.05);
        let length = currentMelodyType === 4 ? 2.0 : 0.5; // Dreamy is longer
        g.gain.exponentialRampToValueAtTime(0.001, t+length);
        o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+length);
    }

    // Scheduler
    function scheduleStep(step, time) {
        let playTime = time + (step % 2 !== 0 ? 0.04 : 0); // Swing

        // Drums
        if(seqKick[step]) playKick(playTime, seqKick[step]);
        if(seqSnare[step]) playSnare(playTime, seqSnare[step]);
        if(seqHat[step]) playHat(playTime, seqHat[step]);

        // Chords (Override if holding pad)
        if(activeChordOverride && step % 4 === 0) {
            // Pulse the held chord
            playSynthChord(playTime, activeChordOverride, true);
        } else if(!activeChordOverride && seqChords[step]) {
            playSynthChord(playTime, seqChords[step], false);
        }

        // Melody
        if(seqMelody[step]) {
            let note = seqMelody[step];
            if(activeChordOverride) {
                // Snap melody to live chord
                let cNotes = activeChordOverride;
                note = cNotes.reduce((p, c) => Math.abs((c%12)-(note%12)) < Math.abs((p%12)-(note%12)) ? c : p) + 12;
            }
            playSynthMelody(playTime, note);
        }
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            scheduleStep(currentStep, nextNoteTime);
            nextNoteTime += (60 / bpm) / 4;
            currentStep = (currentStep + 1) % totalSteps;
        }
        timerID = setTimeout(scheduler, 25);
    }

    function togglePlay() {
        initAudio();
        const btn = document.getElementById('playBtn');
        if (isPlaying) {
            isPlaying = false; clearTimeout(timerID);
            if(audioCtx.state === 'running') audioCtx.suspend();
            btn.innerHTML = "► PLAY"; btn.classList.remove('playing');
        } else {
            generateProcedural(); // Build initial sequence
            isPlaying = true; if(audioCtx.state === 'suspended') audioCtx.resume();
            currentStep = 0; nextNoteTime = audioCtx.currentTime + 0.05;
            scheduler();
            btn.innerHTML = "◼ STOP"; btn.classList.add('playing');
        }
    }

    // Init
    initKnobs();
    setTab(0);
    parseSeedFromInput(); // Sets UI based on default value
</script>
